<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PediFarmaAPP - Urgencias Pediátricas</title>
    
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822143.png">
    
    <link rel="manifest" id="pwa-manifest">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .nav-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- LÓGICA DE INSTALACIÓN PWA ---
        let deferredPrompt;

        // --- ICONOS SVG ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></IconBase>;
        const Thermometer = (props) => <IconBase {...props}><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path></IconBase>;
        const Activity = (props) => <IconBase {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></IconBase>;
        const Droplet = (props) => <IconBase {...props}><path d="M12 22a7 7 0 0 0 7-7c0-2-2-3-2-3L12 2 7 12s-2 1-2 3a7 7 0 0 0 7 7z"></path></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></IconBase>;
        const Heart = (props) => <IconBase {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></IconBase>;
        const Skull = (props) => <IconBase {...props}><circle cx="9" cy="12" r="1"></circle><circle cx="15" cy="12" r="1"></circle><path d="M8 20v2h8v-2"></path><path d="m12.5 17-.5-1-.5 1h1z"></path><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"></path></IconBase>;
        const Wind = (props) => <IconBase {...props}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"></path><path d="M9.6 4.6A2 2 0 1 1 11 8H2"></path><path d="M12.6 19.4A2 2 0 1 0 14 16H2"></path></IconBase>;
        const ChevronRight = (props) => <IconBase {...props}><polyline points="9 18 15 12 9 6"></polyline></IconBase>;
        const Scale = (props) => <IconBase {...props}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="M7 21h10"></path><path d="M12 3v18"></path><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"></path></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></IconBase>;
        const Grid = (props) => <IconBase {...props}><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></IconBase>;
        const Pill = (props) => <IconBase {...props}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></IconBase>;
        const Syringe = (props) => <IconBase {...props}><path d="m18 2 4 4"></path><path d="m17 7 3-3"></path><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"></path><path d="m9 11 4 4"></path><path d="m5 19-3 3"></path><path d="m14 4 6 6"></path></IconBase>;
        const Tube = (props) => <IconBase {...props}><path d="M9 12h6"></path><path d="M12 3v18"></path><path d="M5 19a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2"></path></IconBase>;
        const AlertOctagon = (props) => <IconBase {...props}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></IconBase>;
        const MedicalCross = (props) => <IconBase {...props}><path d="M12 2v20M2 12h20"></path></IconBase>;

        // --- COMPONENTES ---
        const RouteTabs = ({ activeTab, onTabChange, color }) => (
            <div className="flex p-1 bg-gray-100 rounded-lg mb-4">
                <button onClick={() => onTabChange('oral')} className={`flex-1 py-2 px-4 rounded-md text-sm font-bold flex items-center justify-center gap-2 transition-all ${activeTab === 'oral' ? 'bg-white shadow text-gray-800' : 'text-gray-400 hover:text-gray-600'}`}>
                    <Pill size={16} /> Vía oral
                </button>
                <button onClick={() => onTabChange('iv')} className={`flex-1 py-2 px-4 rounded-md text-sm font-bold flex items-center justify-center gap-2 transition-all ${activeTab === 'iv' ? 'bg-white shadow text-gray-800' : 'text-gray-400 hover:text-gray-600'}`}>
                    <Syringe size={16} /> IV / IM
                </button>
            </div>
        );

        const Slide = ({ title, icon: Icon, color, children }) => (
            <div className="flex flex-col h-full bg-white rounded-xl shadow-2xl overflow-hidden border-t-8" style={{ borderColor: color }}>
                <div className="p-4 md:p-6 flex items-center justify-between border-b" style={{ backgroundColor: `${color}10` }}>
                    <div className="flex items-center gap-3">
                        <div className={`p-2 md:p-3 rounded-lg text-white shadow-lg`} style={{ backgroundColor: color }}><Icon size={24} className="w-8 h-8 md:w-8 md:h-8" /></div>
                        <h2 className="text-xl md:text-3xl font-bold text-gray-800">{title}</h2>
                    </div>
                </div>
                <div className="flex-1 p-4 md:p-6 overflow-y-auto bg-slate-50">{children}</div>
            </div>
        );

        const SyringeVisual = ({ drugParts, solventParts, color }) => {
            const total = drugParts + solventParts;
            const drugPct = (drugParts / total) * 100;
            return (
                <div className="mt-3 mb-2">
                    <div className="flex text-xs font-bold text-gray-500 mb-1 justify-between uppercase"><span>Fármaco ({drugParts}cc)</span><span>Suero ({solventParts}cc)</span></div>
                    <div className="h-6 w-full rounded-full overflow-hidden flex border border-gray-300 shadow-inner">
                        <div style={{ width: `${drugPct}%`, backgroundColor: color }} className="h-full flex items-center justify-center text-white text-[10px] font-bold">{drugParts}ml</div>
                        <div style={{ width: `${100 - drugPct}%` }} className="h-full bg-gray-100 flex items-center justify-center text-gray-400 text-[10px] font-bold">{solventParts}ml SSF</div>
                    </div>
                </div>
            );
        };

        const DoseCard = ({ drug, weight, doseInfo, concentrations, color, notes, warning, unit = 'mg', dilution }) => {
            const [concentrationVal, setConcentrationVal] = useState(concentrations ? concentrations.mgPerMl : 0);
            useEffect(() => { if (concentrations) setConcentrationVal(concentrations.mgPerMl); }, [concentrations]);
            const [calculated, setCalculated] = useState(null);
            const [volume, setVolume] = useState(null);

            useEffect(() => {
                const w = parseFloat(weight);
                if (!isNaN(w) && w > 0) {
                    let doseVal = doseInfo.perKg * w;
                    if (doseInfo.max && doseVal > doseInfo.max) doseVal = doseInfo.max;
                    setCalculated(doseVal);
                    if (concentrationVal > 0) setVolume(doseVal / concentrationVal);
                } else {
                    setCalculated(null); setVolume(null);
                }
            }, [weight, doseInfo, concentrationVal]);

            return (
                <div className="bg-white rounded-lg shadow-sm p-4 border-l-4 mb-4 relative" style={{ borderColor: color }}>
                    {warning && <div className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 absolute top-0 right-0 rounded-bl-lg">{warning}</div>}
                    <div className="flex justify-between items-start mb-3">
                        <h3 className="text-lg font-bold text-gray-800 leading-tight">{drug}</h3>
                        {calculated !== null && <span className="bg-gray-800 text-white px-2 py-1 rounded-full text-xs font-mono shadow-sm">{weight} kg</span>}
                    </div>
                    <div className="mb-4 text-sm text-gray-600 bg-gray-50 p-2 rounded border border-gray-100">
                        <span className="font-bold text-gray-500 uppercase text-xs mr-2">Dosis teórica:</span>
                        <span className="font-medium text-gray-800">{doseInfo.text}</span>
                        {doseInfo.maxText && <span className="text-red-500 text-xs ml-2 font-bold">(Máx: {doseInfo.maxText})</span>}
                    </div>
                    <div className="grid grid-cols-2 gap-3 items-stretch">
                        <div className="bg-red-50 border-2 border-red-100 rounded-xl p-3 flex flex-col justify-center relative shadow-sm">
                            <label className="text-[10px] font-black text-red-600 uppercase text-center mb-2">CONCENTRACIÓN</label>
                            {concentrations ? (
                                <div className="bg-white rounded-lg border-2 border-red-200 p-2 flex items-center justify-center">
                                    <input type="number" value={concentrationVal} onChange={(e) => setConcentrationVal(parseFloat(e.target.value) || 0)} className="w-full text-center font-black text-gray-800 text-xl outline-none" />
                                    <span className="text-xs text-gray-400 font-bold pl-1 border-l ml-1">{unit}/ml</span>
                                </div>
                            ) : <div className="text-center text-xs text-gray-400 italic">No aplica</div>}
                        </div>
                        <div className={`border-2 rounded-xl p-3 flex flex-col justify-center items-center text-center shadow-sm ${calculated !== null ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-100'}`}>
                            <label className="text-[10px] font-bold text-gray-400 uppercase mb-2">Dosis paciente</label>
                            {calculated !== null ? (
                                <div className="w-full flex flex-col items-center">
                                    <div className="text-xl font-black text-blue-700">{calculated.toFixed(2).replace(/\.00$/, '')} <span className="text-sm font-bold">{unit}</span></div>
                                    {concentrations && volume !== null && (
                                        <div className="bg-white w-full py-1 mt-1 rounded-lg shadow-sm border border-blue-200 text-green-600 font-bold">➜ {volume.toFixed(2).replace(/\.00$/, '')} ml</div>
                                    )}
                                </div>
                            ) : <span className="text-xs text-gray-400 italic">Esperando peso...</span>}
                        </div>
                    </div>
                    {dilution && <div className="mt-3"><SyringeVisual drugParts={dilution.drugParts} solventParts={dilution.solventParts} color={color} /><p className="text-xs text-gray-500 italic text-center">Mezcla: {dilution.drugParts + dilution.solventParts} cc</p></div>}
                    {notes && <p className="mt-3 text-xs text-gray-600 border-t pt-2 italic">{notes}</p>}
                </div>
            );
        };

        const MainMenu = ({ slides, onNavigate }) => (
            <div className="h-full bg-slate-50 rounded-xl shadow-2xl overflow-y-auto p-4 md:p-8">
                <div className="text-center mb-8">
                    <h2 className="text-3xl font-bold text-gray-800 flex items-center justify-center gap-3"><Grid className="text-blue-600" size={32} /> Índice de protocolos</h2>
                    <p className="text-gray-500 mt-2">Selecciona una categoría para ver el protocolo y dosis</p>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {slides.filter(s => s.id !== 'cover').map((item, index) => {
                        const Icon = item.meta.icon;
                        return (
                            <button key={item.id} onClick={() => onNavigate(index + 1)} className="group relative bg-white p-6 rounded-xl shadow-md border-l-8 text-left h-40 flex flex-col justify-between" style={{ borderColor: item.meta.color }}>
                                <div className="absolute top-0 right-0 p-4 opacity-10"><Icon size={60} color={item.meta.color} /></div>
                                <div className="relative z-10">
                                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-white mb-4 shadow-lg" style={{ backgroundColor: item.meta.color }}><Icon size={20} /></div>
                                    <h3 className="text-xl font-bold text-gray-800">{item.meta.title}</h3>
                                </div>
                                <div className="flex items-center text-sm font-semibold text-gray-400">Ver protocolo <ChevronRight size={16} /></div>
                            </button>
                        );
                    })}
                </div>
            </div>
        );

        function UrgenciasApp() {
            const [slideIndex, setSlideIndex] = useState(0);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [weight, setWeight] = useState('');
            const [canInstall, setCanInstall] = useState(false);
            const [activeTabs, setActiveTabs] = useState({ pain: 'oral', sedation: 'iv' });

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    setCanInstall(true);
                });
            }, []);

            const installApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setCanInstall(false);
                deferredPrompt = null;
            };

            const colors = { pain: '#ef4444', sedation: '#8b5cf6', fluids: '#3b82f6', seizure: '#f59e0b', allergy: '#ec4899', cpr: '#10b981', toxic: '#6366f1', resp: '#06b6d4', intub: '#1e3a8a' };

            const slides = [
                {
                    id: 'cover',
                    meta: { title: 'Portada', icon: Home, color: '#3b82f6' },
                    render: () => (
                        <div className="h-full flex flex-col items-center justify-center text-center bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-xl shadow-2xl p-8 relative overflow-hidden">
                            <MedicalCross size={80} className="mb-6 animate-pulse" />
                            <h1 className="text-4xl font-extrabold mb-4 tracking-tight">PediFarmaAPP</h1>
                            <div className="text-lg mb-8 opacity-90 space-y-2">
                                <p>Creado por <strong>Elena Martínez de la Hidalga</strong> (<a href="https://www.instagram.com/rescateir/" target="_blank" className="underline font-bold">@rescateir</a>)</p>
                                <p>Y por <strong>Elena Plaza Moreno</strong> - <a href="https://www.urgenciasyemergencias.com" target="_blank" className="underline font-bold">www.urgenciasyemergencias.com</a></p>
                            </div>
                            
                            <div className="bg-white/20 backdrop-blur-md rounded-xl p-6 mb-6 max-w-md w-full border border-white/30">
                                <div className="flex items-center gap-3 mb-2 justify-center"><Scale size={24} /><label className="text-lg font-semibold">Calculadora interactiva</label></div>
                                <div className="relative">
                                    <input type="number" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="Peso en kg" className="w-full p-4 rounded-lg text-gray-900 text-center text-2xl font-bold outline-none" />
                                    <span className="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 font-bold">KG</span>
                                </div>
                            </div>

                            <div className="flex flex-col gap-3 w-full max-w-md">
                                <button onClick={() => setIsMenuOpen(true)} className="bg-white text-blue-600 px-10 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition-all flex items-center justify-center gap-3 text-lg">
                                    <span>Comenzar</span><ChevronRight size={24} />
                                </button>
                                
                                {canInstall && (
                                    <button onClick={installApp} className="bg-green-500 text-white px-10 py-3 rounded-full font-bold shadow-lg hover:bg-green-600 transition-all flex items-center justify-center gap-3">
                                        <Download size={20} /> Descargar app
                                    </button>
                                )}
                            </div>
                        </div>
                    )
                },
                {
                    id: 'anaphylaxis',
                    meta: { title: 'Anafilaxia', icon: AlertTriangle, color: colors.allergy },
                    render: () => (
                        <Slide title="Anafilaxia" icon={AlertTriangle} color={colors.allergy}>
                            <div className="flex flex-col items-center justify-center h-full">
                                <div className="w-full max-w-2xl bg-pink-50 border-2 border-pink-400 rounded-xl p-6 text-center shadow-lg">
                                    <h3 className="text-2xl font-bold text-pink-700 mb-4 uppercase">Adrenalina IM</h3>
                                    <div className="flex items-center justify-center gap-6 mb-6">
                                        <div><p className="text-sm font-bold text-gray-500 uppercase">Dosis</p><p className="text-4xl font-extrabold text-gray-800">0.01 mg/kg</p></div>
                                        <div className="h-12 w-1 bg-pink-200"></div>
                                        <div><p className="text-sm font-bold text-gray-500 uppercase">Sin diluir</p><p className="text-2xl font-bold text-gray-800">1:1000</p></div>
                                    </div>
                                    {weight > 0 ? (
                                        <div className="bg-white p-6 rounded-xl shadow-inner border border-pink-100">
                                            <p className="text-5xl font-black text-pink-600 mb-2">{(0.01 * parseFloat(weight)).toFixed(2)} mg</p>
                                            <p className="text-2xl font-bold text-gray-800 bg-pink-100 px-4 py-1 rounded">= {(0.01 * parseFloat(weight)).toFixed(2)} ml</p>
                                        </div>
                                    ) : <div className="bg-gray-100 p-4 rounded-lg">Introduce peso para calcular volumen exacto</div>}
                                    <p className="mt-6 text-sm text-red-500 font-bold">* Máximo 0.5 mg (0.5 ml) por dosis.</p>
                                </div>
                            </div>
                        </Slide>
                    )
                },
                // Aquí irían el resto de slides (se mantienen igual que tu original)
                { id: 'seizure', meta: { title: 'Convulsiones', icon: Activity, color: colors.seizure }, render: () => <Slide title="Convulsiones" icon={Activity} color={colors.seizure}><DoseCard drug="Diazepam IV" weight={weight} color={colors.seizure} doseInfo={{ perKg: 0.2, text: "0.2 mg/kg" }} concentrations={{ mgPerMl: 5 }} /></Slide> },
                { id: 'pain', meta: { title: 'Dolor y fiebre', icon: Thermometer, color: colors.pain }, render: () => <Slide title="Dolor y fiebre" icon={Thermometer} color={colors.pain}><DoseCard drug="Paracetamol oral" weight={weight} color={colors.pain} doseInfo={{ perKg: 15, text: "15 mg/kg" }} concentrations={{ mgPerMl: 100 }} /></Slide> }
            ];

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col items-center p-4 md:p-8">
                    {slideIndex !== 0 && !isMenuOpen && (
                        <div className="w-full max-w-4xl flex justify-between items-center mb-6 bg-white p-3 rounded-xl shadow-md sticky top-0 z-50">
                            <div className="flex items-center gap-3 flex-1">
                                <button onClick={() => setSlideIndex(0)} className="bg-gray-100 p-2 rounded-lg"><Home size={24}/></button>
                                <select value={slideIndex} onChange={(e) => e.target.value === 'menu' ? setIsMenuOpen(true) : setSlideIndex(parseInt(e.target.value))} className="nav-select flex-1 bg-white border border-gray-200 font-bold py-2 px-3 rounded-lg">
                                    {slides.map((s, idx) => idx !== 0 && <option key={s.id} value={idx}>{s.meta.title}</option>)}
                                    <option value="menu">📋 Ver índice completo...</option>
                                </select>
                            </div>
                            <div className="flex items-center gap-2 border-l pl-4 ml-2">
                                <div className="relative">
                                    <input type="number" value={weight} onChange={(e) => setWeight(e.target.value)} className="w-20 p-2 rounded bg-blue-50 border border-blue-200 text-center font-bold text-blue-800" />
                                    <span className="absolute right-1 bottom-1 text-[10px] text-blue-300 font-bold">kg</span>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="w-full max-w-5xl flex-1 mb-8">
                        {isMenuOpen ? <MainMenu slides={slides} onNavigate={(i) => {setSlideIndex(i); setIsMenuOpen(false);}} /> : slides[slideIndex].render()}
                    </div>
                    {!isMenuOpen && slideIndex !== 0 && (
                        <div className="py-4 text-center text-gray-500 text-xs border-t mt-4">
                            <p className="font-bold">PediFarmaAPP v2.0</p>
                            <p>Elena Plaza Moreno - www.urgenciasyemergencias.com</p>
                        </div>
                    )}
                </div>
            );
        }

        // --- REGISTRO DE SERVICE WORKER INLINE ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'pedifarma-v1';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['./'])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // --- GENERACIÓN DE MANIFEST INLINE ---
        const manifest = {
            name: "PediFarmaAPP",
            short_name: "PediFarma",
            start_url: "./",
            display: "standalone",
            background_color: "#f3f4f6",
            theme_color: "#3b82f6",
            icons: [{ src: "https://cdn-icons-png.flaticon.com/512/822/822143.png", sizes: "512x512", type: "image/png" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        document.getElementById('pwa-manifest').setAttribute('href', URL.createObjectURL(manifestBlob));

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UrgenciasApp />);
    </script>
